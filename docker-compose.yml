services:
  mysql:
    image: mysql:8.0
    container_name: oms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-oms}
      MYSQL_USER: ${MYSQL_USER:-oms_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-oms_password}
    ports:
      - '3306:3306'
    volumes:
      - oms_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${MYSQL_ROOT_PASSWORD:-root_password}']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  oms_mysql_data:
    driver: local
